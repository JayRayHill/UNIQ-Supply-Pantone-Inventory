<!doctype html>
<!--
  Ink Inventory — internal print-shop tool.
  Static page served by Cloudflare Pages; data lives in Cloudflare D1 and is
  read/written through the API in /functions/api (same-origin fetch calls).
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Ink Inventory</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%234f8cff'/></svg>" />
</head>
<body>

<!-- ======================= TOP BAR ======================= -->
<header class="topbar">
  <div class="topbar__title">
    <span class="dot"></span>
    <h1>Ink Inventory</h1>
  </div>

  <div class="topbar__tools">
    <!-- Text search matches Pantone code AND description. -->
    <input id="search" class="search" type="search" placeholder="Search code or description…" autocomplete="off" />

    <!-- Sort control. Rainbow = perceptual hue order, the default view. -->
    <label class="select">
      Sort
      <select id="sort">
        <option value="rainbow" selected>Rainbow</option>
        <option value="pantone">Pantone code</option>
        <option value="weight">Weight</option>
      </select>
    </label>

    <!-- Toggles select mode: card taps select instead of opening the editor. -->
    <button id="selectBtn" class="btn">Select</button>
    <button id="addBtn" class="btn btn--primary">+ Add ink</button>
  </div>

  <!-- Bulk actions appear as a second header row while select mode is on,
       so they ride along with the sticky top bar instead of covering cards. -->
  <div id="bulkBar" class="bulkbar" hidden>
    <span id="bulkCount" class="bulkbar__count">0 selected</span>

    <button id="bulkSelectVisible" class="btn btn--ghost">Select visible</button>

    <!-- Choosing a family applies it to every selected card. -->
    <select id="bulkFamily" class="bulkbar__family">
      <option value="" disabled selected>Change family…</option>
    </select>

    <button id="bulkDelete" class="btn btn--danger">Delete</button>
    <button id="bulkCancel" class="btn btn--ghost">Cancel</button>
  </div>
</header>

<!-- ======================= FILTER BAR ======================= -->
<section class="filters">
  <!-- Color-family chips get injected here by app.js. -->
  <div id="familyChips" class="chips" aria-label="Filter by color family"></div>

  <div class="filters__right">
    <label class="toggle">
      <input type="checkbox" id="showUsedUp" />
      <span>Show used-up</span>
    </label>

    <!-- Cards with no swatch preview are hidden by default; this reveals them
         (needed e.g. to fix a mistyped code that can't be matched). -->
    <label class="toggle">
      <input type="checkbox" id="showUnmatched" />
      <span id="showUnmatchedLabel">Show unmatched</span>
    </label>

    <!-- "Close match" helper: enter a target hex or Pantone code. -->
    <div class="match">
      <input id="matchInput" class="search search--sm" type="text" placeholder="Closest to… (#hex or code)" autocomplete="off" />
      <button id="matchBtn" class="btn btn--ghost">Find</button>
      <button id="matchClear" class="btn btn--ghost" hidden>Clear</button>
    </div>
  </div>
</section>

<!-- Running count, e.g. "Showing 64 of 320 inks". -->
<div id="count" class="count"></div>

<!-- ======================= CARD GRID ======================= -->
<main id="grid" class="grid" aria-live="polite"></main>

<!-- Empty / loading / error states share this element. -->
<div id="state" class="state">Loading inventory…</div>

<!-- ======================= ADD / EDIT MODAL ======================= -->
<div id="modal" class="modal" hidden>
  <div class="modal__backdrop" data-close></div>
  <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__head">
      <h2 id="modalTitle">Add ink</h2>
      <button class="modal__x" data-close aria-label="Close">&times;</button>
    </div>

    <form id="inkForm" class="form">
      <!-- Hidden field carries the database id when editing. -->
      <input type="hidden" id="f_id" />

      <label class="field">
        <span>Pantone code <em>*</em></span>
        <!-- type=text on purpose so "165 U" / "P-115-5" stay exactly as typed. -->
        <input id="f_pantone" type="text" maxlength="60" required autocomplete="off" />
        <small class="hint">Stored exactly as typed. e.g. 7706, 185, 165 U, Rhodamine Red</small>
      </label>

      <label class="field">
        <span>Description</span>
        <input id="f_description" type="text" maxlength="255" autocomplete="off" />
      </label>

      <label class="field">
        <span>Color family <em>*</em></span>
        <select id="f_colorFamily" required></select>
      </label>

      <div class="field-row">
        <label class="field">
          <span>Weight (lbs)</span>
          <input id="f_weight" type="number" step="0.1" min="0" inputmode="decimal" />
        </label>
        <label class="field">
          <span>Quantity</span>
          <input id="f_quantity" type="number" step="1" min="1" placeholder="1" inputmode="numeric" />
        </label>
      </div>

      <label class="field">
        <span>Location</span>
        <input id="f_location" type="text" maxlength="100" placeholder="e.g. Shelf B3" autocomplete="off" />
      </label>

      <!-- Edit-only: mark used up / back in stock. -->
      <div id="statusRow" class="field status-row" hidden>
        <span>Status</span>
        <div class="status-toggle">
          <span id="statusLabel" class="pill">In Stock</span>
          <button type="button" id="statusToggleBtn" class="btn btn--ghost">Mark used up</button>
        </div>
      </div>

      <div id="formError" class="form-error" hidden></div>

      <div class="form__actions">
        <!-- Edit-only. Permanent removal (typos / true duplicates); prefer
             "Mark used up" for real cans so history stays. Asks to confirm. -->
        <button type="button" id="deleteBtn" class="btn btn--danger form__delete" hidden>Delete</button>
        <button type="button" class="btn btn--ghost" data-close>Cancel</button>
        <button type="submit" id="saveBtn" class="btn btn--primary">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast for success / error messages. -->
<div id="toast" class="toast" hidden></div>

<!-- Data first, then the app logic that reads it. -->
<script src="/pantone-data.js"></script>
<script src="/app.js"></script>
</body>
</html>
